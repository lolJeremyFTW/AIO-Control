# SSHes into the VPS and runs the deploy script committed at deploy/vps-deploy.sh.
#
# IMPORTANT: this workflow is MANUAL-ONLY (workflow_dispatch). The
# auto-trigger on push was burning GitHub Actions minutes — Jeremy
# deploys directly on the VPS instead via:
#
#     ssh jeremy@vps
#     cd /home/jeremy/aio-control && bash deploy/vps-deploy.sh
#
# To run this from GitHub anyway, go to Actions → deploy → Run workflow.
#
# Repository secrets needed (configure under Settings → Secrets and variables → Actions):
#   - VPS_TAILSCALE_HOST  : Tailscale machine name or IP
#   - VPS_SSH_USER        : "jeremy"
#   - VPS_SSH_PRIVATE_KEY : an SSH private key authorized in /home/jeremy/.ssh/authorized_keys

name: deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run deploy script over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_TAILSCALE_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          envs: GITHUB_SHA
          script: |
            export GIT_COMMIT_SHA="${GITHUB_SHA}"
            cd /home/jeremy/aio-control
            bash deploy/vps-deploy.sh
